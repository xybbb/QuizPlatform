<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="historyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dd6b20;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 时钟外框 -->
  <circle cx="32" cy="32" r="28" fill="url(#historyGrad)" stroke="#c05621" stroke-width="2"/>
  
  <!-- 时钟刻度 -->
  <line x1="32" y1="10" x2="32" y2="14" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="32" x2="14" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="32" x2="54" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- 指针 -->
  <line x1="32" y1="32" x2="32" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="42" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- 中心点 -->
  <circle cx="32" cy="32" r="3" fill="white"/>
  
  <!-- 逆时针箭头 -->
  <path d="M 32 14 C 22 14 14 22 14 32" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 18 20 L 14 24 L 18 28" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
