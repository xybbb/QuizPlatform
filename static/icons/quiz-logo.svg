<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- 纸张/试卷 -->
  <rect x="30" y="25" width="40" height="50" rx="3" fill="white" opacity="0.95"/>
  <line x1="38" y1="35" x2="62" y2="35" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="43" x2="62" y2="43" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="51" x2="62" y2="51" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="59" x2="55" y2="59" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 对勾标记 -->
  <circle cx="68" cy="65" r="14" fill="#48bb78"/>
  <path d="M 62 65 L 67 70 L 74 62" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- 装饰光点 -->
  <circle cx="75" cy="30" r="4" fill="white" opacity="0.3"/>
