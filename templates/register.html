{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="mb-3">
    <a href="{{ url_for('quiz.index') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> 返回首页
    </a>
</div>
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header bg-white text-center py-4">
                <h3><i class="bi bi-person-plus me-2"></i>注册</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-person me-1"></i>用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-envelope me-1"></i>邮箱</label>
                        <input type="email" name="email" class="form-control" placeholder="请输入邮箱" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="bi bi-lock me-1"></i>密码</label>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-person-check me-2"></i>注册
                    </button>
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
                已有账号？ <a href="{{ url_for('auth.auth_login') }}">去登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
