{% extends "base.html" %}
{% block title %}管理后台{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-speedometer2 me-2"></i>管理后台</h2>
</div>
<div class="row g-4">
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_categories') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-folder-symlink fs-1 text-primary mb-3"></i>
                    <h5>分类管理</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_groups') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-layers fs-1 text-success mb-3"></i>
                    <h5>分组管理</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_questions') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-question-circle fs-1 text-warning mb-3"></i>
                    <h5>题目管理</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_import') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-upload fs-1 text-info mb-3"></i>
                    <h5>批量导入</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_export_page') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-download fs-1 text-secondary mb-3"></i>
                    <h5>导出数据</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_users') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-people fs-1 text-danger mb-3"></i>
                    <h5>用户管理</h5>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('admin.admin_history') }}" class="text-decoration-none">
            <div class="card text-center py-4">
                <div class="card-body">
                    <i class="bi bi-clock-history fs-1 text-dark mb-3"></i>
                    <h5>答题历史</h5>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
