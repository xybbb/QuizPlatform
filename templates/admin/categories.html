{% extends "base.html" %}
{% block title %}分类管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-folder-symlink me-2"></i>分类管理</h2>
</div>
<div class="card mb-4">
    <div class="card-body">
        <form method="post" action="{{ url_for('admin.admin_category_add') }}" class="row g-3">
            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="分类名称" required>
            </div>
            <div class="col-md-4">
                <select name="parent_id" class="form-select">
                    <option value="">无父分类</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-plus-lg"></i> 添加分类
                </button>
            </div>
        </form>
    </div>
</div>
<div class="table-responsive">
    <table class="table table-hover align-middle bg-white">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>名称</th>
                <th>父分类</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.id }}</td>
                <td><i class="bi bi-folder me-1 text-primary"></i>{{ cat.name }}</td>
                <td>{{ cat.parent.name if cat.parent else '-' }}</td>
                <td>
                    <a href="{{ url_for('admin.admin_category_delete', id=cat.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">
                        <i class="bi bi-trash"></i> 删除
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i> 暂无分类
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
