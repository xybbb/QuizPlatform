{% extends "base.html" %}
{% block title %}导出答题数据{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card">
            <div class="card-header bg-white">
                <h4><i class="bi bi-download me-2"></i>导出答题数据</h4>
            </div>
            <div class="card-body p-4">
                <form method="get" action="{{ url_for('admin.admin_export') }}">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">开始日期</label>
                            <input type="date" name="start_date" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">结束日期</label>
                            <input type="date" name="end_date" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">分类</label>
                            <select name="category_id" class="form-select">
                                <option value="">全部</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" placeholder="模糊搜索">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-file-earmark-excel"></i> 导出 Excel
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
